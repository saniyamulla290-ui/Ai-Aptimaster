version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: aptimaster-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: aptimaster
    volumes:
      - mongodb_data:/data/db
    networks:
      - aptimaster-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aptimaster-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/aptimaster?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_SECRET: your-refresh-token-secret-change-in-production
      REFRESH_TOKEN_EXPIRES_IN: 30d
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - aptimaster-network
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: aptimaster-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aptimaster-network
  # Optional: AI Service (placeholder for future)
  # ai-service:
  #   build:
  #     context: ./ai-service
  #     dockerfile: Dockerfile
  #   container_name: aptimaster-ai-service
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   networks:
  #     - aptimaster-network

networks:
  aptimaster-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
